name: inmoment_flutter
description: "InMoment Flutter client"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.2
  file_picker: ^8.0.0+1
  signalr_netcore: ^1.4.3
  app_links: ^6.0.0
  share_plus: ^10.0.2
  camera: ^0.11.0+2
  permission_handler: ^11.3.1
  flutter_contacts: ^1.1.9+2
  url_launcher: ^6.3.0
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^17.2.4
  device_info_plus: ^10.1.2
  package_info_plus: ^8.0.2
  web: ^1.1.0
  path_provider: ^2.1.4
  image_picker: ^1.1.2
  video_player: ^2.11.1
  chewie: ^1.7.5
  flutter_native_video_trimmer: ^1.1.9
  video_compress: ^3.1.3
  visibility_detector: ^0.4.0
  video_trimmer: ^5.0.0
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - lib/assets/branding/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/assets/branding/app_icon.png"
  adaptive_icon_background: "#0c080d"
  adaptive_icon_foreground: "lib/assets/branding/app_icon.png"

flutter_native_splash:
  color: "#0c080d"
  image: lib/assets/branding/splash_icon.png

  android_12:
    color: "#0c080d"
    image: lib/assets/branding/splash_icon.png
    icon_background_color: "#0c080d"

  android: true
  ios: true
  web: true